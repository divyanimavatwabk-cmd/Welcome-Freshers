<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Freshers! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff4d8d;
      --yellow: #ffe94a;
      --cyan:   #00e5ff;
      --purple: #c850f0;
      --green:  #00f5a0;
      --bg:     #0d0422;
    }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Animated mesh background ── */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite alternate;
    }
    .blob:nth-child(1){ width:460px;height:460px;background:var(--purple);top:-100px;left:-80px;animation-duration:9s; }
    .blob:nth-child(2){ width:360px;height:360px;background:var(--pink);bottom:-60px;right:-60px;animation-duration:11s;animation-delay:-3s; }
    .blob:nth-child(3){ width:300px;height:300px;background:var(--cyan);top:40%;left:55%;animation-duration:7s;animation-delay:-5s; }
    .blob:nth-child(4){ width:220px;height:220px;background:var(--green);bottom:10%;left:10%;animation-duration:10s;animation-delay:-1s; }

    @keyframes float {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,40px) scale(1.1); }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      max-width: 680px;
      width: 92%;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 32px;
      padding: 56px 44px 48px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(60px) scale(0.93); }
      to   { opacity:1; transform: translateY(0)    scale(1); }
    }

    /* ── Emoji burst ── */
    .emoji-burst {
      font-size: 3.2rem;
      letter-spacing: 6px;
      margin-bottom: 16px;
      display: block;
      animation: bounceIn 0.7s 0.4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes bounceIn {
      from { opacity:0; transform: scale(0.4) rotate(-10deg); }
      to   { opacity:1; transform: scale(1)   rotate(0deg); }
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2.8rem, 8vw, 4.8rem);
      line-height: 1.05;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--pink) 50%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: slideUp 0.8s 0.55s cubic-bezier(.22,1,.36,1) both;
      position: relative;
    }
    .headline::after {
      content: '';
      display: block;
      margin: 12px auto 0;
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--yellow), var(--pink));
      animation: widthIn 0.7s 1.1s ease both;
    }
    @keyframes widthIn {
      from { width: 0; opacity: 0; }
      to   { width: 80px; opacity: 1; }
    }

    /* ── Subheadline ── */
    .sub {
      margin-top: 22px;
      font-size: clamp(1.05rem, 3vw, 1.3rem);
      color: rgba(255,255,255,0.78);
      font-weight: 600;
      line-height: 1.6;
      animation: slideUp 0.8s 0.75s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Tags ── */
    .tags {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      animation: slideUp 0.8s 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    .tag {
      padding: 7px 18px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: default;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .tag:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
    .tag:nth-child(1){ background:var(--pink);   color:#fff; }
    .tag:nth-child(2){ background:var(--yellow); color:#111; }
    .tag:nth-child(3){ background:var(--cyan);   color:#111; }
    .tag:nth-child(4){ background:var(--purple); color:#fff; }
    .tag:nth-child(5){ background:var(--green);  color:#111; }

    /* ── CTA button ── */
    .cta {
      margin-top: 36px;
      display: inline-block;
      padding: 16px 48px;
      border-radius: 999px;
      font-family: 'Boogaloo', cursive;
      font-size: 1.35rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(200,80,240,0.45);
      animation: slideUp 0.8s 1.05s cubic-bezier(.22,1,.36,1) both, pulse 2.5s 2s ease-in-out infinite;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .cta:hover { transform: scale(1.07) translateY(-2px); box-shadow: 0 14px 40px rgba(200,80,240,0.6); }
    .cta:active { transform: scale(0.97); }

    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 32px rgba(200,80,240,0.45); }
      50%      { box-shadow: 0 8px 48px rgba(200,80,240,0.75); }
    }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 38px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      animation: slideUp 0.8s 1.2s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Floating decorative stars ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.08; transform: scale(0.8); }
      to   { opacity: 0.55; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <!-- Twinkling stars -->
  <div class="stars" id="stars"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Main card -->
  <div class="card">
    <span class="emoji-burst">🎓🎉🥳🎊✨</span>

    <h1 class="headline">Welcome&nbsp;Freshers!</h1>

    <p class="sub">
      Your journey begins today.<br />
      New friends, new dreams, new adventures — it all starts <em>right here</em>.
    </p>

    <div class="tags">
      <span class="tag">🎭 New Beginnings</span>
      <span class="tag">🏆 Class of 2025</span>
      <span class="tag">🌍 Make Memories</span>
      <span class="tag">🚀 Dream Big</span>
      <span class="tag">🤝 New Friends</span>
    </div>

    <button class="cta" id="celebrate-btn">🎊 Celebrate! 🎊</button>

    <p class="footer-note">You made it. Now make it count. 💫</p>
  </div>

  <script>
    /* ── Twinkling stars ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --d:${(Math.random()*3+1.5).toFixed(1)}s;
        animation-delay:${(Math.random()*3).toFixed(1)}s;
      `;
      starsEl.appendChild(s);
    }

    /* ── Confetti system ── */
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    let pieces   = [];
    let running  = false;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#ff4d8d','#ffe94a','#00e5ff','#c850f0','#00f5a0','#ff7043','#ffffff'];
    const SHAPES = ['circle','rect','triangle'];

    function spawnPiece(x, y) {
      return {
        x, y,
        vx: (Math.random() - 0.5) * 12,
        vy: Math.random() * -16 - 6,
        gravity: 0.45,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 10,
        size: Math.random() * 10 + 5,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
        alpha: 1,
        life: 1,
        decay: Math.random() * 0.012 + 0.008
      };
    }

    function spawnBurst(x, y, count = 80) {
      for (let i = 0; i < count; i++) pieces.push(spawnPiece(x, y));
    }

    function drawPiece(p) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -p.size / 2);
        ctx.lineTo(p.size / 2, p.size / 2);
        ctx.lineTo(-p.size / 2, p.size / 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces = pieces.filter(p => p.alpha > 0);
      pieces.forEach(p => {
        p.x  += p.vx;
        p.vy += p.gravity;
        p.y  += p.vy;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;
        p.alpha = Math.max(0, p.life);
        drawPiece(p);
      });
      if (pieces.length > 0) requestAnimationFrame(animate);
      else running = false;
    }

    function launchConfetti(x, y) {
      spawnBurst(x ?? canvas.width / 2, y ?? canvas.height * 0.4);
      if (!running) { running = true; animate(); }
    }

    /* Auto-launch on load from multiple spots */
    window.addEventListener('load', () => {
      setTimeout(() => {
        launchConfetti(canvas.width * 0.25, canvas.height * 0.3);
        setTimeout(() => launchConfetti(canvas.width * 0.75, canvas.height * 0.3), 250);
        setTimeout(() => launchConfetti(canvas.width * 0.5,  canvas.height * 0.45), 500);
      }, 900);
    });

    /* Button click */
    document.getElementById('celebrate-btn').addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      launchConfetti(rect.left + rect.width / 2, rect.top);
      /* Extra bursts from edges */
      setTimeout(() => launchConfetti(canvas.width * 0.1, canvas.height * 0.5), 120);
      setTimeout(() => launchConfetti(canvas.width * 0.9, canvas.height * 0.5), 240);
    });

    /* Click anywhere for confetti */
    document.addEventListener('click', (e) => {
      if (e.target.id !== 'celebrate-btn') launchConfetti(e.clientX, e.clientY);
    });
  </script>

</body>
</html>
